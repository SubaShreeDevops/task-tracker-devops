name: CI-CD

on:
  push:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Run tests
      run: |
        pip install -r app/requirements.txt
        pytest

    - name: Build Docker Image
      run: |
        docker build -t username/task-tracker .

    - name: Login DockerHub
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Push image
      run: |
        docker push username/task-tracker

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          docker pull username/task-tracker
          docker stop task || true
          docker rm task || true
          docker run -d -p 3000:3000 --name task username/task-tracker
